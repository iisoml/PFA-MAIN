name: Build and Push to Docker Hub

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'  # Only push on main branch pushes, not PRs
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: ${{ github.event_name == 'push' }}  # Only push on main, not PRs
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-tat-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lab-tat-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest summary
        run: |
          echo "≡ƒôª Docker image built and pushed:"
          echo "   - ${{ secrets.DOCKERHUB_USERNAME }}/lab-tat-api:latest"
          echo "   - ${{ secrets.DOCKERHUB_USERNAME }}/lab-tat-api:${{ github.sha }}"
